name: 🐛 Bug report
description: Report a reproducible issue with the AdGeist React Native SDK.
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve this package. Please share as much context as you can.
  - type: textarea
    id: summary
    attributes:
      label: Bug summary
      description: What happened, and what did you expect instead?
      placeholder: e.g. The ad container does not render on Android after the provider mounts.
  - type: textarea
    id: environment
    attributes:
      label: Environment details
      description: Share your React Native, Expo, iOS, or Android context.
      placeholder: React Native version, package version, platform, and any relevant setup notes.
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Outline the steps to reproduce the bug.
      placeholder: |
        1. Install @thealteroffice/react-native-adgeist
        2. Add the provider and ad component
        3. Launch the app and observe the issue
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste error messages, stack traces, or add screenshots if helpful.
      placeholder: Paste relevant logs or attach screenshots here.
